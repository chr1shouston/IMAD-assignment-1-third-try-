name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java (required for Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Grant permission for Gradle
      - name: Make Gradlew executable
        run: chmod +x ./gradlew

      # 4. Build the project
      - name: Build with Gradle
        run: ./gradlew build

      # 5. Run unit tests (if you have any)
      - name: Run tests
        run: ./gradlew test
